<!DOCTYPE html>
<html>
<head>
    <title>Test Checkout API</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Test Checkout API</h1>
    <button onclick="testCheckout()">Test Checkout Endpoint</button>
    <div id="result"></div>

    <script>
        async function testCheckout() {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = '⏳ Testing...';
            
            try {
            const backendBase = (window.__BACKEND_URL__ || '').trim() || 'http://localhost:3001';
            const response = await fetch(`${backendBase}/api/payments/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: 68885,
                currency: 'ZAR',
                successUrl: `${window.location.origin}/order-confirmation?status=success`,
                cancelUrl: `${window.location.origin}/checkout?canceled=true`,
                failureUrl: `${window.location.origin}/checkout?payment_failed=true`
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultEl.innerHTML = `
                        <div class="success">
                            <h3>✅ Success!</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            <p><strong>Redirect URL:</strong></p>
                            <p>${data.redirectUrl}</p>
                            <button onclick="goToCheckout()">Go to Checkout</button>
                        </div>
                    `;
                } else {
                    resultEl.innerHTML = `
                        <div class="error">
                            <h3>❌ Error</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultEl.innerHTML = `
                    <div class="error">
                        <h3>❌ Request Failed</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        function goToCheckout() {
            // This should redirect to localhost:5173/order-confirmation, not checkout.yoco.com
            const testData = JSON.parse(document.querySelector('pre').textContent);
            window.location.href = testData.redirectUrl;
        }
    </script>
</body>
</html>
